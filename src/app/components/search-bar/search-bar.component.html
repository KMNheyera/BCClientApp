<form class="d-flex" role="search" (submit)="onSearch(); $event.preventDefault()">
  
  <input
    class="form-control me-2"
    type="search"
    [placeholder]="placeholder"
    aria-label="Search"
    [(ngModel)]="searchText"
    name="searchText"
  >

  <button class="btn btn-outline-success" type="submit">
    Search
  </button>

</form>
